<html>

<head>
  <meta charset="utf-8" />
  <title>Portafolis 3D</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>
    <a-assets>
        <a-asset-item id="cotxe" src="assets/cotxe.glb"> </a-asset-item>
    </a-assets>
    <!-- Càmera + controls -->
    <a-entity position="0 1.6 4">
      <a-camera wasd-controls look-controls></a-camera>
    </a-entity>

    <!-- Cel i terra -->
    <a-sky color="#222844"></a-sky>
    <a-plane rotation="-90 0 0" width="30" height="30" color="#444"></a-plane>

    <!-- Títol -->
    <a-text value="Portafolis Marc Miquel" color="#FFD700" position="0 3 -2" align="center" width="6">
    </a-text>
    <a-entity gltf-model="#cotxe" scale="100 100 100" position="-2 0 -3" rotation="0 180 0">
    </a-entity>
    <!-- 🔹 Projecte 1: el Porsche -->
    <a-entity position="-2 0 -3" rotation="0 45 0">


      <a-text value="Porsche 911 Turbo S (1992)" position="0 1.5 0" align="center" color="#FFD700" width="4">
      </a-text>
    </a-entity>

    <!-- Panell projecte 2 -->
    <a-box position="2 1 -3" depth="0.1" height="2" width="3" color="#03A9F4">
      <a-text value="Projecte 2" align="center" position="0 1 0.06" width="3"></a-text>
    </a-box>

    <!-- Panell projecte 3 -->
    <a-box position="0 1 -6" depth="0.1" height="2" width="3" color="#E91E63">
      <a-text value="Projecte 3" align="center" position="0 1 0.06" width="3"></a-text>
    </a-box>

    <!-- Llum -->
    <a-entity light="type: ambient; color: #BBB"></a-entity>
    <a-entity light="type: point; color: white; intensity: 1" position="0 4 4"></a-entity>
  </a-scene>
</body>

</html>
